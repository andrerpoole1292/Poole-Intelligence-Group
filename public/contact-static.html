<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us — Poole Intelligence Group</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; color: #1B2A4A; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 24px; }
        .header { text-align: center; margin-bottom: 48px; }
        .header h1 { font-size: 48px; font-weight: 800; letter-spacing: -0.02em; }
        .header h1 span { background: linear-gradient(135deg, #1B2A4A, #3A5A8C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header p { margin-top: 16px; font-size: 18px; color: #666; }
        .form-card { max-width: 600px; margin: 0 auto; background: #F5F7FA; border: 1px solid #E8E8E8; border-radius: 16px; padding: 48px; }
        .form-row { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: #1B2A4A; }
        label .required { color: #ef4444; }
        input, select, textarea {
            width: 100%; padding: 12px 16px; border: 1px solid #C0C0C0; border-radius: 8px; font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s; background: #fff; color: #1B2A4A;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #1B2A4A; box-shadow: 0 0 0 3px rgba(27, 42, 74, 0.1); }
        textarea { resize: vertical; min-height: 100px; }
        button {
            width: 100%; padding: 16px; background: #1B2A4A; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        button:hover { background: #2A3A5A; }
        .footer-text { text-align: center; margin-top: 12px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Let's Start a <span>Conversation</span></h1>
            <p>Tell us about your AI goals and challenges.</p>
        </div>
        <div class="form-card">
            <form id="contact-form" onsubmit="event.preventDefault();var f=this;var d=new FormData(f);var x=new XMLHttpRequest();x.open('POST','/api/leads',true);x.setRequestHeader('Content-Type','application/json;charset=UTF-8');x.setRequestHeader('Accept','application/json');x.onload=function(){if(x.status===200||x.status===201){var r=JSON.parse(x.responseText||'{}');document.getElementById('form-success').style.display='block';document.getElementById('form-success').innerHTML=r.message||'Thank you! We\'ll be in touch within 1 business day.';f.reset();f.style.display='none';}else{alert('Something went wrong. Please email us at hello@pooleintelligencegroup.com.');}};x.onerror=function(){alert('Network error. Please email us at hello@pooleintelligencegroup.com.');};x.send(JSON.stringify({name:f.name.value,email:f.email.value,company:f.company.value,service:f.service.value,message:f.message.value}));" action="/api/leads" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Full name <span class="required">*</span></label>
                        <input type="text" id="name" name="name" required placeholder="Jane Smith" />
                    </div>
                    <div class="form-group">
                        <label for="email">Email address <span class="required">*</span></label>
                        <input type="email" id="email" name="email" required placeholder="jane@company.com" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="company">Company</label>
                        <input type="text" id="company" name="company" placeholder="Acme Corp" />
                    </div>
                    <div class="form-group">
                        <label for="service">Service interest</label>
                        <select id="service" name="service">
                            <option value="">Select a service...</option>
                            <option value="consulting">AI Strategy & Consulting</option>
                            <option value="training">Training & Enablement</option>
                            <option value="managed">Managed AI Solutions</option>
                            <option value="other">Other / Not sure</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="message">Message <span class="required">*</span></label>
                    <textarea id="message" name="message" required placeholder="Tell us about your AI goals..."></textarea>
                </div>
                <button type="submit">Send Message</button>
                <p class="footer-text">We respect your privacy. No spam, no sharing your data.</p>
            </form>
            <div id="form-success" style="display:none;text-align:center;padding:24px;background:#e8f5e9;border-radius:8px;color:#2e7d32;font-weight:500;margin-top:16px;"></div>
        </div>
    </div>
</body>
</html>
